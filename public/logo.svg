<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" /> <!-- Violet-500 -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Blue-500 -->
    </linearGradient>

    <!-- Glossy Overlay -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Shadow filter for 3D effect -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Circular Outer Glow & Ring -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)" />
  <circle cx="50" cy="50" r="46" fill="url(#glossGrad)" />
  
  <!-- Outer golden/yellow accent ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="8 4" />

  <!-- Graduation Cap (Mortarboard) -->
  <g filter="url(#dropShadow)" transform="translate(0, -3)">
    <!-- Cap Rhombus (Top) -->
    <polygon points="50,26 80,39 50,52 20,39" fill="#ffffff" />
    <polygon points="50,29 74,39 50,49 26,39" fill="#f5f3ff" />

    <!-- Cap Skull (Underneath) -->
    <path d="M35,46 L35,58 C35,65 65,65 65,58 L65,46 C58,50 42,50 35,46 Z" fill="#e0e7ff" />
    <path d="M38,48 L38,57 C38,62 62,62 62,57 L62,48 C55,51 45,51 38,48 Z" fill="#ffffff" />

    <!-- Tassel Button -->
    <circle cx="50" cy="39" r="2.5" fill="#f59e0b" />

    <!-- Tassel String and Hanging Part -->
    <path d="M50,39 Q68,43 74,54" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" />
    <polygon points="74,54 71,62 77,62" fill="#d97706" />
  </g>

  <!-- Open Book at the bottom -->
  <g filter="url(#dropShadow)" transform="translate(0, 10)">
    <!-- Book Back/Cover -->
    <path d="M26,62 C38,58 48,62 50,64 C52,62 62,58 74,62 L74,66 C62,62 52,66 50,68 C48,66 38,62 26,66 Z" fill="#1e1b4b" />
    
    <!-- Left Page -->
    <path d="M25,60 C37,56 47,60 49,62 L49,50 C47,48 37,44 25,48 Z" fill="#ffffff" />
    <!-- Right Page -->
    <path d="M75,60 C63,56 53,60 51,62 L51,50 C53,48 63,44 75,48 Z" fill="#f8fafc" />

    <!-- Book Spire line -->
    <line x1="50" y1="49" x2="50" y2="63" stroke="#e2e8f0" stroke-width="1.5" />
    
    <!-- Dynamic page lines (text indicator) -->
    <path d="M29,51 Q37,49 44,52" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round" />
    <path d="M29,54 Q37,52 44,55" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round" />
    <path d="M29,57 Q37,55 44,58" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round" />

    <path d="M71,51 Q63,49 56,52" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round" />
    <path d="M71,54 Q63,52 56,55" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round" />
    <path d="M71,57 Q63,55 56,58" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-linecap="round" />
  </g>

  <!-- Sparkles -->
  <path d="M18,22 Q18,17 13,17 Q18,17 18,12 Q18,17 23,17 Q18,17 18,22 Z" fill="#fef08a" />
  <path d="M82,22 Q82,19 79,19 Q82,19 82,16 Q82,19 85,19 Q82,19 82,22 Z" fill="#fef08a" />
</svg>
